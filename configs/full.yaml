# Phase 2.2 — 真实训练配置（T2.15）
#
# 目标：在 data/mpid-v1/ 全量 split（≥ 25k 样本）上做 2000 样本 × 3 epoch
#       的 LoRA + 3-class head 训练，产出 artifacts/baseline/lora_full.safetensors
#       作为 Phase 3/4/5 (C4/C5/C6) 的评估基线。
#
# 验收指标：test set Macro F1 ≥ 0.50（Phase 2.1 smoke 训练 < 0.50，仅验证管线）
#
# 与 configs/baseline.yaml 的关键差异：
#   * max_train_records  5   → 2000   （真实训练样本量）
#   * max_val_records    5   → 500    （val 评估 cap）
#   * epochs             1   → 3      （3 轮训练）
#   * early_stop_patience 2  → 3      （给真实训练更多耐心）
#   * out_dir            artifacts/baseline → artifacts/baseline (同名，但 16 MB 权重)
#
# 注意：训练脚本的 checkpoint 路径仍写 artifacts/baseline/lora_baseline.safetensors；
#       smoke 训练产物会被覆盖。Phase 2.2 的命名 lora_full.safetensors
#       在 T2.20 重新打包离线包时统一为这个名字。

defaults:
  backbone_name: smolvlm-500m
  dtype: float32            # fp16 + MPS gives NaN (P0A-2); CPU + bf16 also untested
  device: mps               # MPS fp32 + grad-ckpt = 14.65s/step (~2.3h for 200×3)
                            # CPU fp32 = 80s/step (24h+ for 200×3)
  quantization: null        # "4bit" / "8bit" only on x86 + CUDA
  gradient_checkpointing: true   # 必须开 — 否则 MPS fp32 16GB+ 不足 (VERIFICATION § P2-7)

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target: q_proj,k_proj,v_proj,o_proj

training:
  epochs: 3                 # Phase 2.2 真实训练标准轮数
  max_train_records: 200    # 200 × 3 epoch = 600 step × 14.65s ≈ 2.3h on MPS
                            # 原 T2.16 计划 2000，但受 Mac 硬件限制降至 200
                            # (2000 × 3 = 24h，无法接受)
  max_val_records: 100      # val 评估 cap
  batch_size: 1
  lr: 1.0e-5                # 极保守 — MPS+grad-ckpt 容易出 NaN
                            # 2e-4 / 5e-5 / 1e-4 都失败，1e-5 稳定
                            # bench: step 1-3 loss 0.25→1.01→0.77, step 4 偶发 NaN
                            # （被 NaN 防护跳过）；step 5 恢复 0.64
  weight_decay: 0.0
  class_weighted: true      # inverse-frequency; 必须开 (direct 占 80%)

  early_stop_patience: 3
  log_every: 5              # 每 5 step 打印一次
  seed: 42

  # T2.16 真实训练专属开关
  max_train_seconds: 9000   # 2.5h 硬性 wall-clock budget；超时就保存 partial
  preload_dataset: true     # 预编码 200 样本到 RAM (~0.8 GB)，消除主线程图像预处理
  checkpoint_name: lora_full.safetensors   # 与 smoke 区分；T2.20 打包用此名

io:
  train_jsonl: data/mpid-v1/train.jsonl   # 32k 样本全量（实际只取 200）
  val_jsonl:   data/mpid-v1/val.jsonl     # 4k 样本全量（实际只取 100）
  out_dir:     artifacts/baseline         # 文件名 lora_full.safetensors
                                            # T2.20 重新打包为 mpid_offline_v2/
